<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Night kub 🌙✨</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mali:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(180deg, #0f172a 0%, #1e1b4b 45%, #2e1065 75%, #4c1d95 100%);
            color: #f8fafc;
            font-family: 'Prompt', 'Mali', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            padding: 20px;
            transition: background 0.3s ease;
        }

        /* Screen Flash Effect on Huge Hug */
        body.flash-hug {
            background: linear-gradient(180deg, #1e1b4b 0%, #4c0519 50%, #831843 100%);
        }

        /* Ambient Stars Background */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            background: radial-gradient(1.5px 1.5px at 10% 20%, rgba(255, 255, 255, 0.8), rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 30% 60%, rgba(255, 255, 255, 0.9), rgba(0,0,0,0)),
                        radial-gradient(1px 1px at 70% 30%, rgba(255, 255, 255, 0.7), rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 85% 80%, rgba(255, 255, 255, 0.85), rgba(0,0,0,0)),
                        radial-gradient(2.5px 2.5px at 15% 75%, rgba(251, 191, 36, 0.8), rgba(0,0,0,0)),
                        radial-gradient(1.5px 1.5px at 90% 15%, rgba(244, 114, 182, 0.8), rgba(0,0,0,0));
            animation: twinkle 4s infinite alternate ease-in-out;
        }

        @keyframes twinkle {
            0% { opacity: 0.4; }
            100% { opacity: 0.9; }
        }

        /* Animated Clouds */
        .cloud {
            position: fixed;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 100px;
            backdrop-filter: blur(4px);
            pointer-events: none;
            z-index: 2;
            animation: floatCloud linear infinite;
        }

        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 50%;
        }

        .cloud-1 {
            width: 180px;
            height: 50px;
            top: 12%;
            left: -200px;
            animation-duration: 35s;
        }
        .cloud-1::before { width: 80px; height: 80px; top: -35px; left: 25px; }
        .cloud-1::after { width: 60px; height: 60px; top: -20px; left: 85px; }

        .cloud-2 {
            width: 240px;
            height: 60px;
            top: 25%;
            left: -280px;
            animation-duration: 48s;
            animation-delay: 12s;
            opacity: 0.8;
        }
        .cloud-2::before { width: 100px; height: 100px; top: -45px; left: 35px; }
        .cloud-2::after { width: 80px; height: 80px; top: -30px; left: 110px; }

        @keyframes floatCloud {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(100vw + 350px)); }
        }

        /* Shooting Star Effect */
        .shooting-star {
            position: fixed;
            top: 10%;
            left: 80%;
            width: 120px;
            height: 2px;
            background: linear-gradient(90deg, rgba(255,255,255,1), rgba(255,255,255,0));
            animation: shoot 5s infinite ease-in-out;
            pointer-events: none;
            z-index: 2;
            transform: rotate(-35deg);
        }

        @keyframes shoot {
            0% { transform: translateX(0) translateY(0) rotate(-35deg); opacity: 0; }
            30% { opacity: 1; }
            60% { transform: translateX(-400px) translateY(280px) rotate(-35deg); opacity: 0; }
            100% { opacity: 0; }
        }

        /* Floating Moon */
        .moon-bg {
            position: fixed;
            top: 6%;
            right: 12%;
            font-size: 5rem;
            filter: drop-shadow(0 0 25px rgba(251, 191, 36, 0.7));
            animation: float 6s infinite ease-in-out;
            z-index: 2;
            opacity: 0.9;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        /* Landscape Background: Grass & Trees */
        .landscape {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 180px;
            pointer-events: none;
            z-index: 3;
        }

        .hills {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100%;
        }

        .tree {
            position: absolute;
            bottom: 25px;
            font-size: 4.5rem;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
            opacity: 0.85;
        }
        .tree-right { right: 5%; }
        .tree-left { left: 3%; font-size: 3.5rem; }

        .grass-layer {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 50px;
            background: linear-gradient(to top, #0f172a, rgba(15, 23, 42, 0.8));
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            padding-bottom: 5px;
            font-size: 1.2rem;
            opacity: 0.7;
        }

        /* Bottom-Left Creator Badge */
        .made-by {
            position: fixed;
            bottom: 15px;
            left: 18px;
            z-index: 20;
            font-family: 'Mali', cursive;
            font-size: 0.8rem;
            color: #cbd5e1;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 6px 14px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
        }

        .made-by:hover {
            transform: translateY(-2px) scale(1.05);
            border-color: rgba(244, 114, 182, 0.4);
            color: #fde68a;
        }

        /* Main Glassmorphism Card Container */
        .card {
            position: relative;
            z-index: 10;
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 32px;
            padding: 35px 25px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7),
                        0 0 40px rgba(244, 114, 182, 0.2);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
            margin-bottom: 40px;
        }

        /* Bounce Card Animation */
        .card.bounce-hug {
            transform: scale(1.06);
            box-shadow: 0 0 60px rgba(244, 114, 182, 0.8), 0 0 100px rgba(192, 132, 252, 0.5);
        }

        .avatar-container {
            width: 90px;
            height: 90px;
            margin: 0 auto 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .avatar-bg {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(244, 114, 182, 0.3), rgba(192, 132, 252, 0.3));
            border: 2px dashed rgba(251, 191, 36, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            animation: pulseGlow 3s infinite ease-in-out;
            transition: transform 0.3s ease;
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 15px rgba(244, 114, 182, 0.3); transform: scale(1); }
            50% { box-shadow: 0 0 30px rgba(244, 114, 182, 0.6); transform: scale(1.05); }
        }

        .header-title {
            font-family: 'Mali', cursive;
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fde68a, #f472b6, #c084fc);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
            text-shadow: 0 0 20px rgba(244, 114, 182, 0.3);
        }

        .subtitle {
            font-size: 0.9rem;
            color: #cbd5e1;
            margin-bottom: 15px;
            font-weight: 300;
        }

        /* Live Clock Badge */
        .clock-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #fde68a;
            margin-bottom: 20px;
        }

        /* Custom Text Box Container */
        .message-box {
            background: rgba(15, 23, 42, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 22px 20px;
            margin-bottom: 20px;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .custom-message {
            font-family: 'Mali', cursive;
            font-size: 1.15rem;
            line-height: 1.9;
            color: #f8fafc;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.4);
            white-space: pre-line;
            word-break: keep-all;
        }

        .sorry-text {
            display: block;
            margin-top: 10px;
            font-size: 0.95rem;
            opacity: 0.8;
            font-weight: 300;
        }

        /* Interactive Send Love Button */
        .love-btn-container {
            margin-bottom: 20px;
            position: relative;
        }

        .love-btn {
            background: linear-gradient(135deg, #f472b6, #c084fc);
            border: none;
            color: white;
            font-family: 'Mali', cursive;
            font-size: 1rem;
            font-weight: 700;
            padding: 12px 26px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(244, 114, 182, 0.5), 0 0 15px rgba(192, 132, 252, 0.4);
            transition: all 0.2s ease;
            position: relative;
            z-index: 5;
            animation: pulseBtn 2s infinite ease-in-out;
        }

        @keyframes pulseBtn {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); box-shadow: 0 6px 25px rgba(244, 114, 182, 0.8); }
        }

        .love-btn:hover {
            transform: translateY(-3px) scale(1.08) !important;
            box-shadow: 0 8px 30px rgba(244, 114, 182, 0.9);
        }

        .love-btn:active {
            transform: translateY(2px) scale(0.95) !important;
        }

        /* Music Controls Widget */
        .music-player {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            padding: 16px;
        }

        .music-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .music-info {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            color: #e2e8f0;
        }

        .music-icon {
            font-size: 1.2rem;
            animation: spin 8s linear infinite;
            animation-play-state: paused;
        }

        .music-icon.playing {
            animation-play-state: running;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .music-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1.1rem;
        }

        .music-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.08);
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .volume-icon {
            font-size: 0.9rem;
            color: #fde68a;
            min-width: 20px;
        }

        .volume-slider {
            appearance: none;
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.2);
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            appearance: none;
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #f472b6;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(244, 114, 182, 0.8);
        }

        .volume-text {
            font-size: 0.75rem;
            color: #94a3b8;
            min-width: 32px;
            text-align: right;
        }

        /* Particle Explosions */
        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 999;
            font-size: 1.5rem;
            will-change: transform, opacity;
        }

        .text-pop {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            font-family: 'Mali', cursive;
            font-weight: 700;
            font-size: 1.3rem;
            color: #fde68a;
            text-shadow: 0 0 12px rgba(244, 114, 182, 0.9), 0 2px 5px rgba(0,0,0,0.8);
            animation: textFloat 1.6s ease-out forwards;
        }

        @keyframes textFloat {
            0% { opacity: 0; transform: translateY(0) scale(0.5); }
            20% { opacity: 1; transform: translateY(-20px) scale(1.2); }
            100% { opacity: 0; transform: translateY(-100px) scale(1); }
        }
    </style>
</head>
<body>

    <!-- Sky Elements -->
    <div class="stars"></div>
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="shooting-star"></div>
    <div class="moon-bg">🌙</div>

    <!-- Landscape Elements (Grass & Trees) -->
    <div class="landscape">
        <svg class="hills" viewBox="0 0 1440 320" preserveAspectRatio="none">
            <path fill="rgba(15, 23, 42, 0.7)" d="M0,224L48,213.3C96,203,192,181,288,181.3C384,181,480,203,576,224C672,245,768,267,864,256C960,245,1056,203,1152,186.7C1248,171,1344,181,1392,186.7L1440,192L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
            <path fill="#0f172a" d="M0,256L60,245.3C120,235,240,213,360,218.7C480,224,600,256,720,261.3C840,267,960,245,1080,229.3C1200,213,1320,203,1380,197.3L1440,192L1440,320L1380,320C1320,320,1200,320,1080,320C960,320,840,320,720,320C600,320,480,320,360,320C240,320,120,320,60,320L0,320Z"></path>
        </svg>
        <div class="tree tree-right">🌳</div>
        <div class="tree tree-left">🌲</div>
        <div class="grass-layer">
            <span>🌿</span><span>🌾</span><span>🌸</span><span>🌱</span><span>🌾</span><span>🌿</span><span>🌷</span><span>🌾</span>
        </div>
    </div>

    <!-- Bottom-Left Creator Info -->
    <div class="made-by">
        <span>✨ for you kub เด็กหญิงเมธิศราภรณ์ 🫶🏻</span>
    </div>

    <!-- Main Card Container -->
    <div class="card" id="mainCard">
        <div class="avatar-container">
            <div class="avatar-bg" id="avatarEmoji">🧸</div>
        </div>

        <h1 class="header-title">Good Night kub</h1>
        <p class="subtitle">คืนนี้ขอให้คุณเตยฝันดีนะ ✨</p>

        <!-- Live Time Badge -->
        <div class="clock-badge">
            <span>⏰</span> <span id="liveTime">00:00:00</span> <span>ได้เวลานอนแล้วน้า</span>
        </div>

        <!-- Message Box -->
        <div class="message-box">
            <p class="custom-message">ฝันดีนะงับคนเก่ง💖
เหนื่อยมาทั้งอาทิตย์พักผ่อนเยอะๆนะครับ
ขวัญอยู่ข้างๆเสมอนะรักมากๆครับ ✨🌙
<span class="sorry-text">ขอโทษที่ทำให้รำคาญนะครับ 🥺</span></p>
        </div>

        <!-- Interactive Hearts Button -->
        <div class="love-btn-container">
            <button class="love-btn" onclick="burstLove(event)">ส่งกอดให้คุณขวัญ 💖✨</button>
        </div>

        <!-- Music Control Panel -->
        <div class="music-player">
            <div class="music-header">
                <div class="music-info">
                    <span class="music-icon" id="musicIcon">🎵</span>
                    <span id="musicStatus">💤</span>
                </div>
                <button class="music-btn" id="playBtn" onclick="togglePlay()" title="เล่น/หยุดเพลง">▶️</button>
            </div>
            <div class="volume-control">
                <span class="volume-icon" id="volumeIcon">🔊</span>
                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="10" oninput="adjustVolume(this.value)">
                <span class="volume-text" id="volumeText">10%</span>
            </div>
        </div>
    </div>

    <!-- Lofi Audio Loop -->
    <audio id="bgMusic" loop preload="auto">
        <source src="song/yung kai - blue (Lyrics).mp3" type="audio/mpeg">
    </audio>

    <script>
        // Music Player Controls
        const bgMusic = document.getElementById('bgMusic');
        const playBtn = document.getElementById('playBtn');
        const musicIcon = document.getElementById('musicIcon');
        const musicStatus = document.getElementById('musicStatus');
        const volumeSlider = document.getElementById('volumeSlider');
        const volumeText = document.getElementById('volumeText');
        const volumeIcon = document.getElementById('volumeIcon');
        let isPlaying = false;

        bgMusic.volume = 0.1;

        function togglePlay() {
            if (isPlaying) {
                bgMusic.pause();
                playBtn.innerText = '▶️';
                musicIcon.classList.remove('playing');
                musicStatus.innerText = 'khun toey narak';
            } else {
                bgMusic.play().then(() => {
                    playBtn.innerText = '⏸️';
                    musicIcon.classList.add('playing');
                    musicStatus.innerText = 'หลับไม่ฝันนะงับ... 🎶';
                }).catch(error => {
                    console.log("Audio play error:", error);
                });
            }
            isPlaying = !isPlaying;
        }

        function adjustVolume(val) {
            const volume = val / 100;
            bgMusic.volume = volume;
            volumeText.innerText = `${val}%`;

            if (val == 0) {
                volumeIcon.innerText = '🔇';
            } else if (val < 50) {
                volumeIcon.innerText = '🔉';
            } else {
                volumeIcon.innerText = '🔊';
            }
        }

        // Live Clock
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('th-TH', { hour12: false });
            document.getElementById('liveTime').innerText = timeString;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Mouse/Touch Trail
        document.addEventListener('pointermove', function(e) {
            if (Math.random() < 0.1) {
                createSimpleParticle(e.clientX, e.clientY, ['💖', '✨', '🌸', '🧸', '🌾'][Math.floor(Math.random() * 5)]);
            }
        });

        function createSimpleParticle(x, y, symbol) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.innerText = symbol;
            p.style.left = `${x}px`;
            p.style.top = `${y}px`;
            p.style.transition = 'all 1.5s ease-out';
            document.body.appendChild(p);

            requestAnimationFrame(() => {
                p.style.transform = `translate(${(Math.random() - 0.5) * 40}px, -80px) scale(1.3)`;
                p.style.opacity = '0';
            });

            setTimeout(() => p.remove(), 1500);
        }

        // High Power Blast Effect when Button Clicked
        function burstLove(e) {
            const card = document.getElementById('mainCard');
            const avatar = document.getElementById('avatarEmoji');

            // 1. Trigger Card Bounce & Glow Animation
            card.classList.add('bounce-hug');
            document.body.classList.add('flash-hug');
            avatar.style.transform = 'scale(1.3) rotate(15deg)';

            setTimeout(() => {
                card.classList.remove('bounce-hug');
                document.body.classList.remove('flash-hug');
                avatar.style.transform = 'scale(1) rotate(0deg)';
            }, 500);

            // 2. Get Button Position
            const rect = e.target.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            // 3. Explosion Particles (360-degree Fireworks)
            const icons = ['💖', '🫂', '💕', '✨', '🌙', '🧸', '🌸', '⭐', '🤍', '💌', '🌿'];
            const particleCount = 42;

            for (let i = 0; i < particleCount; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.innerText = icons[Math.floor(Math.random() * icons.length)];
                p.style.left = `${centerX}px`;
                p.style.top = `${centerY}px`;
                document.body.appendChild(p);

                const angle = (i / particleCount) * Math.PI * 2 + (Math.random() * 0.4);
                const velocity = 100 + Math.random() * 180;
                const targetX = Math.cos(angle) * velocity;
                const targetY = Math.sin(angle) * velocity - 50;
                const rotate = (Math.random() - 0.5) * 360;

                p.style.transition = 'all 1.4s cubic-bezier(0.1, 0.8, 0.3, 1)';

                requestAnimationFrame(() => {
                    p.style.transform = `translate(${targetX}px, ${targetY}px) rotate(${rotate}deg) scale(${1 + Math.random() * 0.8})`;
                    p.style.opacity = '0';
                });

                setTimeout(() => p.remove(), 1400);
            }

            // 4. Pop-up Text Messages Floating Up
            const sweetTexts = ['Hug! 🫂', 'ฝันดีเช่นกานน้า ✨', 'กอดแน่นๆ น้า 🧸', 'big hug 💕'];
            for (let t = 0; t < 3; t++) {
                setTimeout(() => {
                    const textEl = document.createElement('div');
                    textEl.className = 'text-pop';
                    textEl.innerText = sweetTexts[Math.floor(Math.random() * sweetTexts.length)];
                    textEl.style.left = `${centerX + (Math.random() - 0.5) * 160}px`;
                    textEl.style.top = `${centerY - 20}px`;
                    document.body.appendChild(textEl);

                    setTimeout(() => textEl.remove(), 1600);
                }, t * 180);
            }
        }
    </script>
</body>
</html>
